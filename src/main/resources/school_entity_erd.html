
<div id="erd" style="padding:1rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#3C3489' : '#EEEDFE',
    primaryTextColor: dark ? '#c2c0b6' : '#26215C',
    primaryBorderColor: dark ? '#534AB7' : '#AFA9EC',
    secondaryColor: dark ? '#085041' : '#E1F5EE',
    tertiaryColor: dark ? '#3d3d3a' : '#F1EFE8',
  },
});
const diagram = `erDiagram
  SCHOOL_CHAINS {
    uuid id PK
    string chain_code UK
    string name
    string website
    bool active
  }

  SCHOOLS {
    uuid id PK
    uuid chain_id FK
    string name
    string branch_code
    bool is_headquarter
    enum type
    enum board
    string medium
    string udise_code UK
    enum plan
    enum onboarding_step
    bool onboarding_complete
    bool active
  }

  SCHOOL_BASIC_INFO {
    uuid id PK
    uuid school_id FK
    string principal_name
    string official_email
    string website
    string logo_url
    string trust_name
    bool co_ed
    bool residential
    int established_year
  }

  SCHOOL_ADDRESSES {
    uuid id PK
    uuid school_id FK
    string address_line1
    string city
    string state
    string pincode
    decimal latitude
    decimal longitude
    string google_place_id
  }

  SCHOOL_CONTACTS {
    uuid id PK
    uuid school_id FK
    enum contact_type
    string full_name
    string email
    string phone
    bool is_primary
  }

  SCHOOL_SETTINGS {
    uuid id PK
    uuid school_id FK
    string locale
    string timezone
    string currency
    int academic_year_start_month
    int min_attendance_pct
    bool gst_applicable
    string gstin
    bool sms_enabled
  }

  SCHOOL_DOCUMENTS {
    uuid id PK
    uuid school_id FK
    enum document_type
    string file_url
    bool verified
    date expires_on
  }

  ACADEMIC_YEARS {
    uuid id PK
    uuid school_id FK
    string label
    date start_date
    date end_date
    bool is_current
    bool is_locked
  }

  SCHOOL_TERMS {
    uuid id PK
    uuid academic_year_id FK
    string name
    int sort_order
    date start_date
    date end_date
    bool is_locked
  }

  SCHOOL_SHIFTS {
    uuid id PK
    uuid academic_year_id FK
    string name
    time start_time
    time end_time
    bool is_default
  }

  SCHOOL_GRADE_RANGES {
    uuid id PK
    uuid school_id FK
    string segment_name
    string from_grade
    string to_grade
    int from_grade_order
    int to_grade_order
  }

  SCHOOL_FACILITIES {
    uuid id PK
    uuid school_id FK
    enum facility_type
    string description
    bool is_available
  }

  SCHOOL_SOCIAL_LINKS {
    uuid id PK
    uuid school_id FK
    enum platform
    string url
  }

  SCHOOL_ONBOARDING_AUDIT {
    uuid id PK
    uuid school_id FK
    enum step
    string action
    uuid performed_by
    string remarks
  }

  SCHOOL_CHAINS ||--o{ SCHOOLS : "has branches"
  SCHOOLS ||--o| SCHOOL_BASIC_INFO : "has"
  SCHOOLS ||--o| SCHOOL_ADDRESSES : "has"
  SCHOOLS ||--o| SCHOOL_SETTINGS : "has"
  SCHOOLS ||--o{ SCHOOL_CONTACTS : "has"
  SCHOOLS ||--o{ SCHOOL_DOCUMENTS : "uploads"
  SCHOOLS ||--o{ ACADEMIC_YEARS : "runs"
  SCHOOLS ||--o{ SCHOOL_GRADE_RANGES : "offers"
  SCHOOLS ||--o{ SCHOOL_FACILITIES : "has"
  SCHOOLS ||--o{ SCHOOL_SOCIAL_LINKS : "has"
  SCHOOLS ||--o{ SCHOOL_ONBOARDING_AUDIT : "logs"
  ACADEMIC_YEARS ||--o{ SCHOOL_TERMS : "divided into"
  ACADEMIC_YEARS ||--o{ SCHOOL_SHIFTS : "has"
`;
const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
